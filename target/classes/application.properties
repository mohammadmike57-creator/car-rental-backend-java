spring.application.name=backend
server.port=${PORT:8080}

# Use H2 locally; on Render, JDBC_DATABASE_URL will override
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:carrental;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJwtTokenGenerationWithAtLeast32Characters}
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=INFO
