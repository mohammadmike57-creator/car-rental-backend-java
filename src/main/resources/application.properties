spring.application.name=backend
server.port=${PORT:8080}

# Database – Spring Boot will auto‑detect the driver from the URL
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:carrental;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# No dialect – Hibernate will detect from the URL

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJwtTokenGenerationWithAtLeast32Characters}
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=INFO

# Stripe
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.price.id=${STRIPE_PRICE_ID}
